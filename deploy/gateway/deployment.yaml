apiVersion: apps/v1
kind: Deployment
metadata:
  name: tnl-mcp-gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: tnl-mcp-gateway
  template:
    metadata:
      labels:
        app: tnl-mcp-gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/bekirdag/tnl-intelligence-gateway@sha256:REPLACE_WITH_RELEASE_DIGEST
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7318
          envFrom:
            - configMapRef:
                name: tnl-mcp-gateway
            - secretRef:
                name: tnl-mcp-gateway
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 5']
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ['ALL']
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: tnl-mcp-gateway
spec:
  selector:
    app: tnl-mcp-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
