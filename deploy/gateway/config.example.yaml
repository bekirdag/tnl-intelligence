apiVersion: v1
kind: ConfigMap
metadata:
  name: tnl-mcp-gateway
data:
  TNL_GATEWAY_MODE: production
  TNL_GATEWAY_HOST: 0.0.0.0
  TNL_GATEWAY_PORT: '7318'
  TNL_GATEWAY_PUBLIC_URL: https://mcp.theneuralledger.com
  TNL_GATEWAY_AUTHORIZATION_SERVERS: https://identity.example.com
  TNL_GATEWAY_ISSUER: https://identity.example.com
  TNL_GATEWAY_AUDIENCE: https://mcp.theneuralledger.com/mcp
  TNL_GATEWAY_INTROSPECTION_URL: https://identity.example.com/oauth/introspect
  TNL_GATEWAY_ACCESS_URL: https://control.example.com/gateway/access
  TNL_GATEWAY_CAPABILITY_URL: https://control.example.com/gateway/capabilities
  TNL_GATEWAY_QUOTA_URL: https://control.example.com/gateway/quota
  TNL_GATEWAY_DISABLE_URL: https://control.example.com/gateway/disable
  TNL_GATEWAY_AUDIT_URL: https://control.example.com/gateway/audit
  TNL_GATEWAY_IDP_HEALTH_URL: https://identity.example.com/healthz
  TNL_GATEWAY_CONTROL_HEALTH_URL: https://control.example.com/healthz
  TNL_GATEWAY_RESEARCH_URL: https://research.internal.example.com
  TNL_GATEWAY_RESEARCH_TIMEOUT_MS: '45000'
  TNL_GATEWAY_ALLOWED_ORIGINS: https://app.example.com
