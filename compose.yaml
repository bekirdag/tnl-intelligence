services:
  tnl-mcp:
    build: .
    image: ghcr.io/bekirdag/tnl-intelligence:local
    restart: unless-stopped
    environment:
      TNL_BASE_URL: ${TNL_BASE_URL:-https://theneuralledger.com}
    ports:
      - '127.0.0.1:7317:7317'
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
