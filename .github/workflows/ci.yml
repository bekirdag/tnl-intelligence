name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run pack:check
      - run: npm audit --audit-level=high

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e 'python/tnl_intelligence[dev]'
      - run: cd python/tnl_intelligence && ruff check .
      - run: cd python/tnl_intelligence && ruff format --check .
      - run: cd python/tnl_intelligence && mypy src
      - run: cd python/tnl_intelligence && pytest
      - run: python -m build python/tnl_intelligence

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tnl-intelligence:test

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
