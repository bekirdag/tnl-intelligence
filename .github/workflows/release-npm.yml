name: Release npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Confirm the version to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: test "${{ inputs.version }}" = "$(node -p "require('./packages/sdk/package.json').version")"
      - run: npm ci
      - run: npm run validate
      - run: npm run pack:check
      - run: npm publish --workspace @theneuralledger/sdk --provenance --access public
      - run: npm publish --workspace @theneuralledger/research --provenance --access public
      - run: npm publish --workspace @theneuralledger/mcp --provenance --access public
      - run: npm publish --workspace @theneuralledger/cli --provenance --access public
