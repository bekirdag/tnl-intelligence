name: Release Python package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Confirm the version to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: test "${{ inputs.version }}" = "$(python -c 'import tomllib; print(tomllib.load(open("python/tnl_intelligence/pyproject.toml", "rb"))["project"]["version"])')"
      - run: python -m pip install -e 'python/tnl_intelligence[dev]'
      - run: cd python/tnl_intelligence && ruff check . && ruff format --check .
      - run: cd python/tnl_intelligence && mypy src && pytest
      - run: python -m build python/tnl_intelligence
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/tnl_intelligence/dist/
